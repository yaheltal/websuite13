<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: hsl(230, 25%, 6%);
    font-family: 'Heebo', sans-serif;
    overflow: hidden; position: relative;
  }
  .mesh {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 30%, hsl(240, 40%, 18% / 0.7) 0%, transparent 50%),
      radial-gradient(ellipse 60% 80% at 30% 70%, hsl(175, 35%, 14% / 0.5) 0%, transparent 50%);
  }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
  .orb-1 { width: 400px; height: 400px; top: -60px; left: 50%; transform: translateX(-50%); background: radial-gradient(circle, hsla(265, 60%, 50%, 0.15) 0%, transparent 70%); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    height: 100%; padding: 65px 60px 55px;
  }
  .tag {
    background: linear-gradient(135deg, hsl(175, 70%, 40%), hsl(220, 80%, 55%));
    padding: 14px 44px; border-radius: 50px;
    font-size: 28px; font-weight: 700; color: white;
    margin-bottom: 40px; letter-spacing: 1px;
  }
  .title {
    font-size: 62px; font-weight: 900; text-align: center;
    line-height: 1.3; margin-bottom: 50px; color: white;
  }
  .title .teal { color: hsl(175, 80%, 55%); }
  .title .purple { color: hsl(265, 70%, 70%); }
  .compare { display: flex; gap: 28px; width: 100%; max-width: 920px; }
  .col {
    flex: 1; border-radius: 24px; padding: 36px 28px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    backdrop-filter: blur(10px);
  }
  .col-old {
    background: hsla(230, 30%, 15%, 0.5);
    border: 1.5px solid hsla(0, 0%, 100%, 0.08);
  }
  .col-new {
    background: hsla(175, 30%, 15%, 0.4);
    border: 1.5px solid hsla(175, 70%, 50%, 0.2);
  }
  .col-title { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
  .col-old .col-title { color: hsla(0, 0%, 100%, 0.45); }
  .col-new .col-title { color: hsl(175, 80%, 55%); }
  .item {
    font-size: 27px; color: hsla(0, 0%, 100%, 0.65); text-align: center; line-height: 1.5;
    padding: 12px 0; border-bottom: 1px solid hsla(0, 0%, 100%, 0.05); width: 100%;
  }
  .item:last-child { border: none; }
  .col-new .item { color: hsla(0, 0%, 100%, 0.92); }
  .verdict {
    margin-top: 40px; font-size: 34px; font-weight: 700;
    color: hsl(175, 80%, 55%); text-align: center;
  }
  .footer-row {
    margin-top: auto; display: flex; align-items: center; gap: 14px;
    padding-top: 25px;
  }
  .footer-text {
    font-size: 26px; font-weight: 500;
    background: linear-gradient(135deg, hsl(220, 80%, 65%), hsl(260, 70%, 60%), hsl(175, 80%, 55%));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
</style>
</head>
<body>
  <div class="mesh"></div>
  <div class="orb orb-1"></div>
  <div class="content">
    <div class="tag">השוואה</div>
    <div class="title">כרטיס ביקור <span class="purple">מודפס</span> vs <span class="teal">דיגיטלי</span></div>
    <div class="compare">
      <div class="col col-old">
        <div class="col-title">📄 מודפס</div>
        <div class="item">הולך לאיבוד</div>
        <div class="item">לא ניתן לעדכון</div>
        <div class="item">אין קישורים</div>
        <div class="item">עלות הדפסה חוזרת</div>
        <div class="item">מוגבל למידע בסיסי</div>
      </div>
      <div class="col col-new">
        <div class="col-title">📱 דיגיטלי</div>
        <div class="item">תמיד בטלפון של הלקוח</div>
        <div class="item">מתעדכן בזמן אמת</div>
        <div class="item">לינקים ישירים</div>
        <div class="item">תשלום חד פעמי</div>
        <div class="item">גלריה, מפה, וואטסאפ</div>
      </div>
    </div>
    <div class="verdict">🏆 הכרטיס הדיגיטלי מנצח בכל קטגוריה</div>
    <div class="footer-row">
      <svg viewBox="0 0 120 120" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="hsl(220,85%,62%)"/><stop offset="45%" stop-color="hsl(265,75%,60%)"/><stop offset="100%" stop-color="hsl(175,80%,50%)"/></linearGradient>
          <linearGradient id="g2" x1="10" y1="35" x2="110" y2="85" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="hsl(225,85%,65%)"/><stop offset="50%" stop-color="hsl(260,78%,62%)"/><stop offset="100%" stop-color="hsl(180,75%,52%)"/></linearGradient>
        </defs>
        <rect x="8" y="8" width="104" height="104" rx="26" stroke="url(#g1)" stroke-width="3.5" fill="none"/>
        <path d="M28 42 L40 78 L52 54 L64 78 L76 42" stroke="url(#g2)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M80 52 Q88 46 92 52 Q96 58 88 62 Q80 66 84 72 Q88 78 96 72" stroke="url(#g2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="100" cy="28" r="4.5" fill="hsl(175,80%,50%)"/>
      </svg>
      <div class="footer-text">WebSuite</div>
    </div>
  </div>
</body>
</html>
