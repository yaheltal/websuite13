<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: hsl(230, 25%, 6%);
    font-family: 'Heebo', sans-serif;
    overflow: hidden; position: relative;
  }
  .mesh {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 60% 30%, hsl(35, 40%, 16% / 0.6) 0%, transparent 50%),
      radial-gradient(ellipse 60% 70% at 30% 70%, hsl(260, 35%, 14% / 0.7) 0%, transparent 50%);
  }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
  .orb-1 { width: 450px; height: 450px; top: -80px; right: -60px; background: radial-gradient(circle, hsla(40, 70%, 50%, 0.12) 0%, transparent 70%); }
  .orb-2 { width: 350px; height: 350px; bottom: 100px; left: -50px; background: radial-gradient(circle, hsla(260, 60%, 50%, 0.12) 0%, transparent 70%); }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    height: 100%; padding: 65px 80px 55px;
  }
  .tag {
    background: linear-gradient(135deg, hsl(45, 90%, 50%), hsl(30, 85%, 50%));
    padding: 14px 44px; border-radius: 50px;
    font-size: 28px; font-weight: 700; color: hsl(230, 40%, 10%);
    margin-bottom: 45px; letter-spacing: 1px;
  }
  .title {
    font-size: 66px; font-weight: 900; text-align: center;
    line-height: 1.3; margin-bottom: 50px; color: white;
  }
  .title span {
    background: linear-gradient(135deg, hsl(45, 90%, 55%), hsl(30, 85%, 55%));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .checklist { display: flex; flex-direction: column; gap: 22px; width: 100%; max-width: 880px; }
  .check {
    display: flex; align-items: flex-start; gap: 26px;
    background: hsla(230, 30%, 15%, 0.6);
    border: 1.5px solid hsla(45, 70%, 50%, 0.12);
    border-radius: 22px; padding: 30px 36px;
    backdrop-filter: blur(10px);
  }
  .check-icon {
    width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, hsl(45, 90%, 50%), hsl(30, 85%, 50%));
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: hsl(230, 40%, 10%); font-weight: 900;
    box-shadow: 0 6px 20px hsla(40, 70%, 40%, 0.3);
    margin-top: 4px;
  }
  .check-text {
    font-size: 32px; font-weight: 500; line-height: 1.5; color: hsla(0, 0%, 100%, 0.92);
  }
  .cta {
    margin-top: 40px;
    background: linear-gradient(135deg, hsl(265, 70%, 55%), hsl(220, 80%, 55%));
    padding: 22px 56px; border-radius: 18px;
    font-size: 32px; font-weight: 700; color: white;
    box-shadow: 0 12px 36px hsla(260, 60%, 40%, 0.35);
  }
  .footer-row {
    margin-top: auto; display: flex; align-items: center; gap: 14px;
    padding-top: 25px;
  }
  .footer-text {
    font-size: 26px; font-weight: 500;
    background: linear-gradient(135deg, hsl(220, 80%, 65%), hsl(260, 70%, 60%), hsl(175, 80%, 55%));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
</style>
</head>
<body>
  <div class="mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="content">
    <div class="tag">חובה לדעת</div>
    <div class="title"><span>3 דברים</span> שחייבים<br>בדף נחיתה מנצח</div>
    <div class="checklist">
      <div class="check">
        <div class="check-icon">✓</div>
        <div class="check-text">כותרת ברורה שמסבירה מה אתה עושה תוך 3 שניות</div>
      </div>
      <div class="check">
        <div class="check-icon">✓</div>
        <div class="check-text">כפתור קריאה לפעולה בולט — וואטסאפ, טלפון או טופס</div>
      </div>
      <div class="check">
        <div class="check-icon">✓</div>
        <div class="check-text">הוכחה חברתית — עדויות, מספרים, לוגואים של לקוחות</div>
      </div>
    </div>
    <div class="cta">רוצים דף נחיתה שמביא תוצאות? →</div>
    <div class="footer-row">
      <svg viewBox="0 0 120 120" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="hsl(220,85%,62%)"/><stop offset="45%" stop-color="hsl(265,75%,60%)"/><stop offset="100%" stop-color="hsl(175,80%,50%)"/></linearGradient>
          <linearGradient id="g2" x1="10" y1="35" x2="110" y2="85" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="hsl(225,85%,65%)"/><stop offset="50%" stop-color="hsl(260,78%,62%)"/><stop offset="100%" stop-color="hsl(180,75%,52%)"/></linearGradient>
        </defs>
        <rect x="8" y="8" width="104" height="104" rx="26" stroke="url(#g1)" stroke-width="3.5" fill="none"/>
        <path d="M28 42 L40 78 L52 54 L64 78 L76 42" stroke="url(#g2)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M80 52 Q88 46 92 52 Q96 58 88 62 Q80 66 84 72 Q88 78 96 72" stroke="url(#g2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="100" cy="28" r="4.5" fill="hsl(175,80%,50%)"/>
      </svg>
      <div class="footer-text">WebSuite</div>
    </div>
  </div>
</body>
</html>
