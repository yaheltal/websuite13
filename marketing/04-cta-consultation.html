<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>WebSuite - CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Heebo', sans-serif;
    background: hsl(230 25% 6%);
    position: relative;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 80% at 50% 100%, hsl(220 60% 20% / 0.6) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 30% 20%, hsl(260 50% 18% / 0.5) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 80% 30%, hsl(175 50% 15% / 0.3) 0%, transparent 50%);
  }

  /* Decorative rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .ring-1 { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .ring-2 { width: 800px; height: 800px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .ring-3 { width: 1000px; height: 1000px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 80px;
    text-align: center;
    gap: 40px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, hsl(220 80% 55%), hsl(260 70% 55%));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 900;
    color: white;
  }

  .logo-text {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, hsl(220 80% 65%), hsl(260 70% 60%), hsl(175 80% 55%));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .main-text {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .main-text h1 {
    font-size: 64px;
    font-weight: 900;
    color: white;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .main-text h1 span {
    background: linear-gradient(135deg, hsl(175 80% 55%), hsl(220 80% 65%));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .process-steps {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .step-num {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: white;
  }

  .step:nth-child(1) .step-num { background: linear-gradient(135deg, #0ea5a0, #2dd4bf); }
  .step:nth-child(3) .step-num { background: linear-gradient(135deg, #3b82f6, #6366f1); }
  .step:nth-child(5) .step-num { background: linear-gradient(135deg, #8b5cf6, #a855f7); }

  .step-label {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
  }

  .arrow {
    font-size: 28px;
    color: rgba(255,255,255,0.15);
    margin-top: -20px;
  }

  .cta-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .cta-btn {
    display: inline-block;
    padding: 22px 60px;
    border-radius: 18px;
    background: linear-gradient(135deg, hsl(220 80% 55%), hsl(260 70% 55%));
    color: white;
    font-size: 28px;
    font-weight: 800;
    box-shadow:
      0 20px 50px hsla(240, 60%, 40%, 0.4),
      0 0 0 1px rgba(255,255,255,0.1) inset;
  }

  .cta-note {
    font-size: 20px;
    color: hsl(175 60% 55%);
    font-weight: 400;
  }

  .social {
    display: flex;
    gap: 30px;
    margin-top: 10px;
  }

  .social-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.4);
    font-size: 18px;
  }

  .social-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="content">
    <div class="logo-row">
      <div class="logo-icon">W</div>
      <div class="logo-text">WebSuite</div>
    </div>

    <div class="main-text">
      <h1>מוכנים לקחת את העסק<br>שלכם <span>לשלב הבא</span>?</h1>
    </div>

    <div class="process-steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-label">שאלון קצר</div>
      </div>
      <div class="arrow">←</div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-label">שיחת אפיון AI</div>
      </div>
      <div class="arrow">←</div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-label">הדמיה תוך 24 שעות</div>
      </div>
    </div>

    <div class="cta-area">
      <div class="cta-btn">לייעוץ חינם →</div>
      <div class="cta-note">בלי התחייבות · הדמיה ראשונה חינם</div>
    </div>

    <div class="social">
      <div class="social-item"><div class="social-dot"></div>לינק בביו</div>
      <div class="social-item"><div class="social-dot"></div>websuite.co.il</div>
    </div>
  </div>
</body>
</html>
