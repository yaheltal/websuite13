<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>WebSuite - Brand Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Heebo', sans-serif;
    background: hsl(230 25% 6%);
    position: relative;
  }

  /* Mesh background */
  .mesh {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, hsl(240 40% 18% / 0.9) 0%, transparent 50%),
      radial-gradient(ellipse 60% 80% at 80% 80%, hsl(260 35% 14% / 0.85) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 50% 50%, hsl(220 30% 12% / 0.7) 0%, transparent 60%);
  }

  /* Floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }
  .orb-1 {
    width: 500px; height: 500px;
    top: -100px; right: -100px;
    background: radial-gradient(circle, hsla(220, 70%, 55%, 0.25) 0%, transparent 70%);
  }
  .orb-2 {
    width: 400px; height: 400px;
    bottom: -50px; left: -50px;
    background: radial-gradient(circle, hsla(260, 60%, 50%, 0.2) 0%, transparent 70%);
  }
  .orb-3 {
    width: 300px; height: 300px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, hsla(175, 80%, 55%, 0.12) 0%, transparent 70%);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 80px;
    text-align: center;
  }

  .logo {
    margin-bottom: 50px;
  }

  .brand {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, hsl(220 80% 65%), hsl(260 70% 60%), hsl(175 80% 55%));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 30px;
  }

  .tagline {
    font-size: 36px;
    font-weight: 300;
    color: hsl(220 20% 75%);
    line-height: 1.6;
    max-width: 800px;
  }

  .tagline strong {
    font-weight: 700;
    color: white;
  }

  .divider {
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, hsl(220 80% 55%), hsl(175 80% 55%));
    margin: 40px 0;
  }

  .subtitle {
    font-size: 26px;
    color: hsl(175 60% 60%);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="content">
    <div class="logo">
      <svg viewBox="0 0 120 120" width="120" height="120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="hsl(220, 85%, 62%)" />
            <stop offset="45%" stop-color="hsl(265, 75%, 60%)" />
            <stop offset="100%" stop-color="hsl(175, 80%, 50%)" />
          </linearGradient>
          <linearGradient id="g2" x1="10" y1="35" x2="110" y2="85" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="hsl(225, 85%, 65%)" />
            <stop offset="50%" stop-color="hsl(260, 78%, 62%)" />
            <stop offset="100%" stop-color="hsl(180, 75%, 52%)" />
          </linearGradient>
          <radialGradient id="g3" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="hsl(260, 80%, 70%)" stop-opacity="0.3" />
            <stop offset="100%" stop-color="hsl(260, 80%, 70%)" stop-opacity="0" />
          </radialGradient>
        </defs>
        <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#g3)" opacity="0.08" />
        <rect x="8" y="8" width="104" height="104" rx="26" stroke="url(#g1)" stroke-width="3.5" fill="none" />
        <path d="M22 38 L14 60 L22 82" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5" />
        <path d="M98 38 L106 60 L98 82" stroke="url(#g2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5" />
        <path d="M28 42 L40 78 L52 54 L64 78 L76 42" stroke="url(#g2)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M80 52 Q88 46 92 52 Q96 58 88 62 Q80 66 84 72 Q88 78 96 72" stroke="url(#g2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <circle cx="100" cy="28" r="4.5" fill="hsl(175, 80%, 50%)" />
      </svg>
    </div>
    <div class="brand">WebSuite</div>
    <div class="tagline">
      הנוכחות הדיגיטלית שלך<br>
      מתחילה <strong>כאן</strong>
    </div>
    <div class="divider"></div>
    <div class="subtitle">אתרים | חנויות | כרטיסים דיגיטליים</div>
  </div>
</body>
</html>
