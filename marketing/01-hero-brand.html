<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>WebSuite - Brand Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Heebo', sans-serif;
    background: hsl(230 25% 6%);
    position: relative;
  }

  /* Mesh background */
  .mesh {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, hsl(240 40% 18% / 0.9) 0%, transparent 50%),
      radial-gradient(ellipse 60% 80% at 80% 80%, hsl(260 35% 14% / 0.85) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 50% 50%, hsl(220 30% 12% / 0.7) 0%, transparent 60%);
  }

  /* Floating orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }
  .orb-1 {
    width: 500px; height: 500px;
    top: -100px; right: -100px;
    background: radial-gradient(circle, hsla(220, 70%, 55%, 0.25) 0%, transparent 70%);
  }
  .orb-2 {
    width: 400px; height: 400px;
    bottom: -50px; left: -50px;
    background: radial-gradient(circle, hsla(260, 60%, 50%, 0.2) 0%, transparent 70%);
  }
  .orb-3 {
    width: 300px; height: 300px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, hsla(175, 80%, 55%, 0.12) 0%, transparent 70%);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 80px;
    text-align: center;
  }

  .logo {
    width: 100px;
    height: 100px;
    border-radius: 24px;
    background: linear-gradient(135deg, hsl(220 80% 55%), hsl(260 70% 55%));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 900;
    color: white;
    margin-bottom: 50px;
    box-shadow: 0 20px 60px hsla(240, 60%, 40%, 0.4);
  }

  .brand {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, hsl(220 80% 65%), hsl(260 70% 60%), hsl(175 80% 55%));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 30px;
  }

  .tagline {
    font-size: 36px;
    font-weight: 300;
    color: hsl(220 20% 75%);
    line-height: 1.6;
    max-width: 800px;
  }

  .tagline strong {
    font-weight: 700;
    color: white;
  }

  .divider {
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, hsl(220 80% 55%), hsl(175 80% 55%));
    margin: 40px 0;
  }

  .subtitle {
    font-size: 26px;
    color: hsl(175 60% 60%);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="mesh"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="content">
    <div class="logo">W</div>
    <div class="brand">WebSuite</div>
    <div class="tagline">
      הנוכחות הדיגיטלית שלך<br>
      מתחילה <strong>כאן</strong>
    </div>
    <div class="divider"></div>
    <div class="subtitle">אתרים | חנויות | כרטיסים דיגיטליים</div>
  </div>
</body>
</html>
